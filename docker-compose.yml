services:
  web:
    build: .
    volumes:
      - .:/app
    expose:
      - "5000"
    depends_on:
      - db

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: appdb
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: apppass
    volumes:
      - db_data:/var/lib/postgresql/data

  nginx:
    build:
      context: ./image-nginx
      dockerfile: Dockerfile
    ports:
      - "80:80"
    volumes:
      - .:/var/www/repo
      - ./default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web

volumes:
  db_data:
